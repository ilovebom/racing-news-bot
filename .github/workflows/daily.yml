# GitHub Actions 工作流 - 赛车资讯每日自动发布
# 每天北京时间 10:00 自动运行（UTC 时间 02:00）

name: 赛车资讯每日发布

# 需要写权限，才能把 published_history.json 提交回仓库（去重依赖这个文件）
permissions:
  contents: write

on:
  # 定时触发：每天北京时间 10:00（UTC 02:00）
  schedule:
    - cron: '0 2 * * *'  # 注意：GitHub Actions 使用 UTC 时间
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1：检出代码（完整历史，方便后续 git pull）
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整 git 历史
      
      # 步骤 2：设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 步骤 3：安装 Python 依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      
      # 步骤 4：配置环境变量
      - name: 创建 .env 文件
        run: |
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "AI_MODEL=deepseek-chat" >> .env
          echo "AUTO_PUBLISH=false" >> .env
          echo "MAX_NEWS_PER_DAY=8" >> .env
          echo "NEWS_MAX_AGE_DAYS=1" >> .env
          echo "NEWS_MAX_AGE_DAYS_CN=2" >> .env
          echo "LOG_LEVEL=INFO" >> .env
        shell: bash
      
      # 步骤 5：运行主程序
      - name: 运行赛车资讯自动发布
        run: python main.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEWS_MAX_AGE_DAYS: "1"
          NEWS_MAX_AGE_DAYS_CN: "2"
      
      # 步骤 6：提交发布记录回仓库（去重关键步骤！）
      - name: 提交发布记录（去重用）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/published_history.json || true
          if git diff --cached --quiet; then
            echo "没有变更需要提交"
          else
            git commit -m "更新发布记录 $(date -u +%Y-%m-%d)"
            git push
            echo "✅ 发布记录已提交回仓库"
          fi
        shell: bash
      
      # 步骤 7：上传运行结果
      - name: 上传生成的文章
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 生成的文章
          path: data/
          retention-days: 7
